<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teves - TV en Español (con Categorías)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0a0f;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: #111;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e50914;
            flex-wrap: wrap;
            gap: 4px;
            flex-shrink: 0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .logo-icon {
            background: #e50914;
            width: 26px;
            height: 26px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 900;
            color: #fff;
        }
        .logo h1 {
            font-size: 16px;
            font-weight: 700;
        }
        .logo h1 span {
            color: #e50914;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .controls select {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 10px;
            cursor: pointer;
            max-width: 110px;
        }
        .badge {
            background: #e50914;
            padding: 1px 6px;
            border-radius: 8px;
            font-size: 7px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-text {
            font-size: 9px;
            color: #aaa;
        }
        .btn-restore {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 10px;
            cursor: pointer;
        }
        .btn-restore:hover {
            background: #555;
        }
        .container {
            display: flex;
            flex: 1;
            height: calc(100vh - 52px);
            overflow: hidden;
        }
        .sidebar {
            width: 210px;
            min-width: 210px;
            background: #0d0d14;
            border-right: 1px solid #222;
            overflow-y: auto;
            padding: 4px 0;
            flex-shrink: 0;
        }
        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        .channel-item {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 6px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: background 0.1s;
        }
        .channel-item:hover,
        .channel-item.active {
            background: #1a1a2a;
            border-left-color: #e50914;
        }
        .channel-item img {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            object-fit: cover;
            background: #222;
            flex-shrink: 0;
        }
        .channel-item .info {
            flex: 1;
            min-width: 0;
        }
        .channel-item .info .name {
            font-size: 10px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .channel-item .info .cat {
            font-size: 7px;
            color: #666;
        }
        .channel-item .live {
            background: #e50914;
            font-size: 6px;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: 700;
            text-transform: uppercase;
        }
        /* BOTÓN OCULTAR - ULTRA VISIBLE */
        .channel-item .btn-hide {
            background: #e50914;
            border: none;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            padding: 0 6px;
            border-radius: 3px;
            line-height: 18px;
            opacity: 1;
            transition: background 0.2s;
        }
        .channel-item .btn-hide:hover {
            background: #ff3333;
        }
        .load-more-btn {
            background: #1a1a2e;
            color: #aaa;
            border: 1px solid #333;
            padding: 5px;
            margin: 5px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
            text-align: center;
        }
        .load-more-btn:hover {
            background: #2a2a3e;
            color: #fff;
        }
        .player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
        }
        .player-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            min-height: 140px;
            position: relative;
        }
        .player-wrapper video,
        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            max-height: 70vh;
            border: none;
            background: #000;
        }
        .placeholder {
            text-align: center;
            color: #444;
            padding: 10px;
        }
        .placeholder .icon {
            font-size: 30px;
            opacity: 0.3;
        }
        .placeholder h2 {
            font-size: 13px;
            font-weight: 300;
        }
        .placeholder p {
            font-size: 10px;
            color: #555;
        }
        .now-playing {
            background: #111;
            padding: 4px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #222;
            flex-wrap: wrap;
            gap: 3px;
            flex-shrink: 0;
        }
        .now-playing .left {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .now-playing .left img {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            object-fit: cover;
            background: #222;
        }
        .now-playing .left .name {
            font-weight: 600;
            font-size: 11px;
        }
        .now-playing .left .cat {
            font-size: 9px;
            color: #888;
        }
        .now-playing .status {
            font-size: 8px;
            color: #4caf50;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .now-playing .status .dot {
            width: 5px;
            height: 5px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
        }
        @media (max-width: 700px) {
            .sidebar {
                width: 150px;
                min-width: 150px;
            }
            .logo h1 {
                font-size: 13px;
            }
            .controls select {
                max-width: 80px;
                font-size: 8px;
                padding: 2px 4px;
            }
            .channel-item .btn-hide {
                font-size: 12px;
                line-height: 16px;
                padding: 0 4px;
            }
        }
        @media (max-width: 500px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                min-width: unset;
                max-height: 130px;
                border-right: none;
                border-bottom: 1px solid #222;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <div class="logo-icon">T</div>
            <h1>Te<span>ves</span></h1>
        </div>
        <div class="controls">
            <span class="status-text" id="channelCount">Cargando...</span>
            <select id="countrySelector">
                <option value="es">🇪🇸 España</option>
                <option value="mx" selected>🇲🇽 México</option>
                <option value="co">🇨🇴 Colombia</option>
                <option value="ar">🇦🇷 Argentina</option>
                <option value="pe">🇵🇪 Perú</option>
                <option value="cl">🇨🇱 Chile</option>
                <option value="ve">🇻🇪 Venezuela</option>
                <option value="ec">🇪🇨 Ecuador</option>
                <option value="gt">🇬🇹 Guatemala</option>
                <option value="bo">🇧🇴 Bolivia</option>
                <option value="cr">🇨🇷 Costa Rica</option>
                <option value="do">🇩🇴 Rep. Dominicana</option>
                <option value="pa">🇵🇦 Panamá</option>
                <option value="uy">🇺🇾 Uruguay</option>
                <option value="py">🇵🇾 Paraguay</option>
                <option value="ni">🇳🇮 Nicaragua</option>
                <option value="hn">🇭🇳 Honduras</option>
                <option value="sv">🇸🇻 El Salvador</option>
            </select>
            <select id="categoryFilter">
                <option value="all">🎯 Todas</option>
            </select>
            <button class="btn-restore" id="restoreBtn">↩️ Restaurar ocultos</button>
            <span class="badge">CAT</span>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div style="padding:15px;text-align:center;color:#555;font-size:11px;">
                Selecciona país y categoría
            </div>
        </aside>

        <main class="player-area">
            <div class="player-wrapper" id="playerWrapper">
                <div class="placeholder" id="placeholder">
                    <div class="icon">📺</div>
                    <h2>Teves con Categorías</h2>
                    <p>Elige país, filtra por tipo y haz clic</p>
                </div>
                <video id="videoPlayer" style="display:none;" controls autoplay playsinline></video>
                <iframe id="iframePlayer" style="display:none;" allowfullscreen></iframe>
            </div>

            <div class="now-playing" id="nowPlaying">
                <div class="left">
                    <img id="nowLogo" src="" alt="" />
                    <div>
                        <div class="name" id="nowName">Sin canal</div>
                        <div class="cat" id="nowCat">Selecciona uno</div>
                    </div>
                </div>
                <div class="status">
                    <span class="dot"></span>
                    <span>EN VIVO</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ============================================================
        // TEVES - PAÍSES + CATEGORÍAS + OCULTAR CANALES
        // ============================================================

        const CONFIG = {
            itemsPerPage: 40
        };

        let allChannels = [];
        let filteredChannels = [];
        let currentPage = 0;
        let currentChannel = null;
        let isLoading = false;
        let hiddenIds = [];

        function loadHidden() {
            try {
                const data = localStorage.getItem('teves_hidden');
                hiddenIds = data ? JSON.parse(data) : [];
            } catch (e) { hiddenIds = []; }
        }

        function saveHidden() {
            try {
                localStorage.setItem('teves_hidden', JSON.stringify(hiddenIds));
            } catch (e) {}
        }

        function isHidden(channel) {
            return hiddenIds.includes(channel.id);
        }

        function hideChannel(channel) {
            if (!hiddenIds.includes(channel.id)) {
                hiddenIds.push(channel.id);
                saveHidden();
                allChannels = allChannels.filter(ch => ch.id !== channel.id);
                filteredChannels = filteredChannels.filter(ch => ch.id !== channel.id);
                applyCategoryFilter();
            }
        }

        function restoreAll() {
            hiddenIds = [];
            saveHidden();
            const currentCountry = countrySelector.value;
            loadCountry(currentCountry);
        }

        const sidebar = document.getElementById('sidebar');
        const countrySelector = document.getElementById('countrySelector');
        const categoryFilter = document.getElementById('categoryFilter');
        const channelCount = document.getElementById('channelCount');
        const placeholder = document.getElementById('placeholder');
        const videoPlayer = document.getElementById('videoPlayer');
        const iframePlayer = document.getElementById('iframePlayer');
        const nowLogo = document.getElementById('nowLogo');
        const nowName = document.getElementById('nowName');
        const nowCat = document.getElementById('nowCat');
        const restoreBtn = document.getElementById('restoreBtn');

        const categoryMap = {
            'Movies': '🎬 Películas',
            'Movie': '🎬 Películas',
            'Series': '📺 Series',
            'Kids': '👶 Infantil',
            'Children': '👶 Infantil',
            'Documentary': '📚 Educativo/Doc.',
            'Educational': '📚 Educativo',
            'News': '📰 Noticias',
            'Sports': '⚽ Deportes',
            'Music': '🎵 Música',
            'Entertainment': '🎭 Entretenimiento',
            'Comedy': '😂 Comedia',
            'Drama': '🎭 Drama',
            'Reality': '📺 Reality',
            'Talk': '🎙️ Talk Show',
            'General': '📡 General',
            'Latino': '🌎 Latino',
            'Cine': '🎬 Cine',
            'Películas': '🎬 Películas',
            'Infantil': '👶 Infantil',
            'Deportes': '⚽ Deportes',
            'Noticias': '📰 Noticias',
            'Educativo': '📚 Educativo',
            'Música': '🎵 Música'
        };

        function translateCategory(cat) {
            const lower = cat.trim();
            for (let [key, value] of Object.entries(categoryMap)) {
                if (lower.toLowerCase().includes(key.toLowerCase())) {
                    return value;
                }
            }
            return cat;
        }

        function getCountryUrl(countryCode) {
            return `https://iptv-org.github.io/iptv/countries/${countryCode}.m3u`;
        }

        function saveCache(key, data) {
            try { localStorage.setItem('teves_' + key, JSON.stringify(data)); } catch (e) {}
        }

        function getCache(key) {
            try {
                const data = localStorage.getItem('teves_' + key);
                return data ? JSON.parse(data) : null;
            } catch (e) { return null; }
        }

        async function loadCountry(countryCode) {
            if (isLoading) return;
            isLoading = true;

            const countryNames = {
                es: 'España',
                mx: 'México',
                co: 'Colombia',
                ar: 'Argentina',
                pe: 'Perú',
                cl: 'Chile',
                ve: 'Venezuela',
                ec: 'Ecuador',
                gt: 'Guatemala',
                bo: 'Bolivia',
                cr: 'Costa Rica',
                do: 'Rep. Dominicana',
                pa: 'Panamá',
                uy: 'Uruguay',
                py: 'Paraguay',
                ni: 'Nicaragua',
                hn: 'Honduras',
                sv: 'El Salvador'
            };
            const countryName = countryNames[countryCode] || countryCode.toUpperCase();
            channelCount.textContent = 'Descargando...';
            sidebar.innerHTML =
                `<div style="padding:20px;text-align:center;color:#555;font-size:11px;">⏳ Cargando ${countryName}<br><span style="font-size:9px;">(filtrando por categoría)</span></div>`;

            const cacheKey = `channels_${countryCode}`;
            let channels = getCache(cacheKey);

            if (!channels) {
                try {
                    const url = getCountryUrl(countryCode);
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('Error al descargar');
                    const data = await response.text();
                    channels = parseM3U(data);
                    saveCache(cacheKey, channels);
                } catch (error) {
                    console.error(error);
                    sidebar.innerHTML = `
                        <div style="padding:20px;text-align:center;color:#e50914;font-size:12px;">
                            ❌ Error<br><span style="font-size:9px;color:#666;">${error.message}</span>
                            <button onclick="location.reload()" style="margin-top:8px;padding:3px 12px;background:#e50914;border:none;color:#fff;border-radius:3px;cursor:pointer;font-size:10px;">Reintentar</button>
                        </div>
                    `;
                    channelCount.textContent = 'Error';
                    isLoading = false;
                    return;
                }
            }

            allChannels = channels.filter(ch => !isHidden(ch));
            populateCategories();
            applyCategoryFilter();
            isLoading = false;
        }

        function parseM3U(text) {
            const lines = text.split('\n');
            const channels = [];
            let current = null;

            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    let name = 'Canal sin nombre';
                    let logo = 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Television_icon.svg/120px-Television_icon.svg.png';
                    let category = 'General';

                    const logoMatch = line.match(/tvg-logo="([^"]*)"/);
                    if (logoMatch) logo = logoMatch[1];

                    const groupMatch = line.match(/group-title="([^"]*)"/);
                    if (groupMatch) category = groupMatch[1];

                    category = translateCategory(category);

                    const parts = line.split(',');
                    if (parts.length > 1) {
                        name = parts[parts.length - 1].trim();
                    }
                    if (name.length > 50) name = name.substring(0, 47) + '...';

                    current = { name, logo, category, liveUrl: '' };
                } else if (line && !line.startsWith('#') && current) {
                    if (line.startsWith('http://') || line.startsWith('https://')) {
                        current.liveUrl = line;
                        current.id = 'ch_' + Math.random().toString(36).substr(2, 8);
                        channels.push(current);
                        current = null;
                    }
                }
            }
            return channels;
        }

        function populateCategories() {
            const catSet = new Set();
            allChannels.forEach(ch => {
                if (ch.category) catSet.add(ch.category);
            });

            const sortedCats = Array.from(catSet).sort();
            const currentVal = categoryFilter.value;

            categoryFilter.innerHTML = '<option value="all">🎯 Todas</option>';
            sortedCats.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                categoryFilter.appendChild(option);
            });

            if (currentVal !== 'all' && sortedCats.includes(currentVal)) {
                categoryFilter.value = currentVal;
            } else {
                categoryFilter.value = 'all';
            }
        }

        function applyCategoryFilter() {
            const selectedCategory = categoryFilter.value;

            if (selectedCategory === 'all') {
                filteredChannels = [...allChannels];
            } else {
                filteredChannels = allChannels.filter(ch => ch.category === selectedCategory);
            }

            currentPage = 0;
            channelCount.textContent = `${filteredChannels.length} canales`;
            renderChannels();
        }

        function renderChannels() {
            const start = currentPage * CONFIG.itemsPerPage;
            const end = start + CONFIG.itemsPerPage;
            const pageChannels = filteredChannels.slice(start, end);

            if (pageChannels.length === 0 && currentPage === 0) {
                sidebar.innerHTML =
                    `<div style="padding:20px;text-align:center;color:#555;font-size:11px;">📭 Sin canales en esta categoría<br><span style="font-size:9px;">Prueba otra categoría o país</span></div>`;
                return;
            }

            let html = '';
            pageChannels.forEach(ch => {
                const isActive = (currentChannel && currentChannel.id === ch.id) ? 'active' : '';
                html += `
                    <div class="channel-item ${isActive}" data-id="${ch.id}" data-channel='${JSON.stringify(ch).replace(/'/g,"&#39;")}'>
                        <img src="${ch.logo}" alt="${ch.name}" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Television_icon.svg/120px-Television_icon.svg.png'" />
                        <div class="info">
                            <div class="name">${ch.name}</div>
                            <div class="cat">${ch.category}</div>
                        </div>
                        <span class="live">Live</span>
                        <button class="btn-hide" title="Ocultar canal (no volverá a aparecer)">✕</button>
                    </div>
                `;
            });

            if (end < filteredChannels.length) {
                html += `<div class="load-more-btn" id="loadMoreBtn">⬇️ Cargar más (${filteredChannels.length - end} restantes)</div>`;
            }

            sidebar.innerHTML = html;

            document.querySelectorAll('.channel-item').forEach(el => {
                el.addEventListener('click', function(e) {
                    if (e.target.classList.contains('btn-hide')) return;
                    try {
                        const ch = JSON.parse(this.dataset.channel);
                        playChannel(ch);
                    } catch (e) { console.warn('Error'); }
                });
            });

            document.querySelectorAll('.btn-hide').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const parent = this.closest('.channel-item');
                    const ch = JSON.parse(parent.dataset.channel);
                    hideChannel(ch);
                });
            });

            const loadBtn = document.getElementById('loadMoreBtn');
            if (loadBtn) {
                loadBtn.addEventListener('click', () => {
                    currentPage++;
                    renderChannels();
                    sidebar.scrollTop = sidebar.scrollHeight * 0.7;
                });
            }

            if (currentChannel) {
                document.querySelectorAll('.channel-item').forEach(el => {
                    try {
                        const ch = JSON.parse(el.dataset.channel);
                        if (ch.id === currentChannel.id) el.classList.add('active');
                    } catch (e) {}
                });
            }
        }

        function playChannel(channel) {
            if (!channel || !channel.liveUrl) return;
            currentChannel = channel;
            placeholder.style.display = 'none';

            const url = channel.liveUrl;

            if (url.includes('.m3u8') || url.includes('pluto.tv') || url.includes('akamaized') || url.includes('cdn')) {
                videoPlayer.style.display = 'block';
                iframePlayer.style.display = 'none';
                if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                    videoPlayer.src = url;
                } else {
                    loadHLS(url);
                }
                videoPlayer.play().catch(e => console.warn('Auto-play'));
            } else if (url.includes('youtube.com') || url.includes('youtu.be') || url.includes('vimeo.com')) {
                videoPlayer.style.display = 'none';
                iframePlayer.style.display = 'block';
                iframePlayer.src = url;
            } else {
                videoPlayer.style.display = 'block';
                iframePlayer.style.display = 'none';
                videoPlayer.src = url;
                videoPlayer.play().catch(e => console.warn('Auto-play'));
            }

            nowLogo.src = channel.logo || 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Television_icon.svg/120px-Television_icon.svg.png';
            nowName.textContent = channel.name;
            nowCat.textContent = channel.category;

            document.querySelectorAll('.channel-item').forEach(el => {
                el.classList.remove('active');
                try {
                    const ch = JSON.parse(el.dataset.channel);
                    if (ch.id === channel.id) el.classList.add('active');
                } catch (e) {}
            });
        }

        function loadHLS(url) {
            if (typeof Hls !== 'undefined') {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(videoPlayer);
                return;
            }
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest';
            script.onload = () => {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(videoPlayer);
            };
            document.head.appendChild(script);
        }

        countrySelector.addEventListener('change', function() {
            loadCountry(this.value);
        });

        categoryFilter.addEventListener('change', function() {
            applyCategoryFilter();
        });

        restoreBtn.addEventListener('click', function() {
            if (confirm('¿Restaurar todos los canales ocultos?')) {
                restoreAll();
            }
        });

        loadHidden();
        countrySelector.value = 'mx';
        loadCountry('mx');

        window.Teves = {
            loadCountry: loadCountry,
            playChannel: playChannel,
            channels: () => allChannels,
            hidden: () => hiddenIds,
            restoreAll: restoreAll
        };
        console.log('📺 Teves con botones de ocultar visibles');
    </script>
    <script>
    // Registrar el Service Worker para que la app sea instalable
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/teves-app/sw.js')
            .then(() => console.log('✅ Service Worker registrado'))
            .catch(err => console.log('❌ Error en Service Worker:', err));
    }
</script>
</body>
</html>
