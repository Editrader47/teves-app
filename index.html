<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teves - TV Gratis en Español</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0a0f;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: #111;
            padding: 8px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e50914;
            flex-wrap: wrap;
            gap: 6px;
            flex-shrink: 0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-icon {
            background: #e50914;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 900;
            color: #fff;
        }
        .logo h1 {
            font-size: 18px;
            font-weight: 700;
        }
        .logo h1 span {
            color: #e50914;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .controls select {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            max-width: 130px;
        }
        .badge {
            background: #e50914;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 8px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-text {
            font-size: 10px;
            color: #aaa;
        }
        .container {
            display: flex;
            flex: 1;
            height: calc(100vh - 58px);
            overflow: hidden;
        }
        .sidebar {
            width: 220px;
            min-width: 220px;
            background: #0d0d14;
            border-right: 1px solid #222;
            overflow-y: auto;
            padding: 6px 0;
            flex-shrink: 0;
        }
        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        .channel-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: background 0.1s;
        }
        .channel-item:hover,
        .channel-item.active {
            background: #1a1a2a;
            border-left-color: #e50914;
        }
        .channel-item img {
            width: 22px;
            height: 22px;
            border-radius: 3px;
            object-fit: cover;
            background: #222;
            flex-shrink: 0;
        }
        .channel-item .info {
            flex: 1;
            min-width: 0;
        }
        .channel-item .info .name {
            font-size: 11px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .channel-item .info .cat {
            font-size: 8px;
            color: #666;
        }
        .channel-item .live {
            background: #e50914;
            font-size: 6px;
            padding: 1px 4px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .load-more-btn {
            background: #1a1a2e;
            color: #aaa;
            border: 1px solid #333;
            padding: 6px;
            margin: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            text-align: center;
        }
        .load-more-btn:hover {
            background: #2a2a3e;
            color: #fff;
        }
        .player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
        }
        .player-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            min-height: 160px;
            position: relative;
        }
        .player-wrapper video,
        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            max-height: 70vh;
            border: none;
            background: #000;
        }
        .placeholder {
            text-align: center;
            color: #444;
            padding: 12px;
        }
        .placeholder .icon {
            font-size: 35px;
            opacity: 0.3;
        }
        .placeholder h2 {
            font-size: 15px;
            font-weight: 300;
        }
        .placeholder p {
            font-size: 11px;
            color: #555;
        }
        .now-playing {
            background: #111;
            padding: 5px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #222;
            flex-wrap: wrap;
            gap: 4px;
            flex-shrink: 0;
        }
        .now-playing .left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .now-playing .left img {
            width: 24px;
            height: 24px;
            border-radius: 3px;
            object-fit: cover;
            background: #222;
        }
        .now-playing .left .name {
            font-weight: 600;
            font-size: 12px;
        }
        .now-playing .left .cat {
            font-size: 10px;
            color: #888;
        }
        .now-playing .status {
            font-size: 9px;
            color: #4caf50;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .now-playing .status .dot {
            width: 5px;
            height: 5px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
        }
        @media (max-width: 700px) {
            .sidebar {
                width: 160px;
                min-width: 160px;
            }
            .logo h1 {
                font-size: 15px;
            }
            .controls select {
                max-width: 100px;
                font-size: 9px;
            }
        }
        @media (max-width: 500px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                min-width: unset;
                max-height: 140px;
                border-right: none;
                border-bottom: 1px solid #222;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <div class="logo-icon">T</div>
            <h1>Te<span>ves</span></h1>
        </div>
        <div class="controls">
            <span class="status-text" id="channelCount">Cargando...</span>
            <select id="sourceSelector">
                <option value="es">🇪🇸 España</option>
                <option value="mx" selected>🇲🇽 México</option>
                <option value="co">🇨🇴 Colombia</option>
                <option value="ar">🇦🇷 Argentina</option>
                <option value="pe">🇵🇪 Perú</option>
                <option value="cl">🇨🇱 Chile</option>
                <option value="ve">🇻🇪 Venezuela</option>
                <option value="ec">🇪🇨 Ecuador</option>
                <option value="gt">🇬🇹 Guatemala</option>
                <option value="bo">🇧🇴 Bolivia</option>
                <option value="cr">🇨🇷 Costa Rica</option>
                <option value="do">🇩🇴 República Dominicana</option>
                <option value="pa">🇵🇦 Panamá</option>
                <option value="uy">🇺🇾 Uruguay</option>
                <option value="py">🇵🇾 Paraguay</option>
                <option value="ni">🇳🇮 Nicaragua</option>
                <option value="hn">🇭🇳 Honduras</option>
                <option value="sv">🇸🇻 El Salvador</option>
            </select>
            <span class="badge">ESPAÑOL</span>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div style="padding:15px;color:#555;text-align:center;font-size:11px;">
                Selecciona un país arriba
            </div>
        </aside>

        <main class="player-area">
            <div class="player-wrapper" id="playerWrapper">
                <div class="placeholder" id="placeholder">
                    <div class="icon">📺</div>
                    <h2>Teves en Español</h2>
                    <p>Elige un canal de la lista</p>
                </div>
                <video id="videoPlayer" style="display:none;" controls autoplay playsinline></video>
                <iframe id="iframePlayer" style="display:none;" allowfullscreen></iframe>
            </div>

            <div class="now-playing" id="nowPlaying">
                <div class="left">
                    <img id="nowLogo" src="" alt="" />
                    <div>
                        <div class="name" id="nowName">Sin canal</div>
                        <div class="cat" id="nowCat">Selecciona uno</div>
                    </div>
                </div>
                <div class="status">
                    <span class="dot"></span>
                    <span>EN VIVO</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ============================================================
        // TEVES - VERSIÓN ORIGINAL CON PAÍSES
        // ============================================================

        const CONFIG = {
            itemsPerPage: 50
        };

        let allChannels = [];
        let currentPage = 0;
        let currentChannel = null;
        let isLoading = false;

        const sidebar = document.getElementById('sidebar');
        const sourceSelector = document.getElementById('sourceSelector');
        const channelCount = document.getElementById('channelCount');
        const placeholder = document.getElementById('placeholder');
        const videoPlayer = document.getElementById('videoPlayer');
        const iframePlayer = document.getElementById('iframePlayer');
        const nowLogo = document.getElementById('nowLogo');
        const nowName = document.getElementById('nowName');
        const nowCat = document.getElementById('nowCat');

        function getCountryUrl(countryCode) {
            return `https://iptv-org.github.io/iptv/countries/${countryCode}.m3u`;
        }

        function saveCache(key, data) {
            try { localStorage.setItem('teves_' + key, JSON.stringify(data)); } catch (e) {}
        }

        function getCache(key) {
            try {
                const data = localStorage.getItem('teves_' + key);
                return data ? JSON.parse(data) : null;
            } catch (e) { return null; }
        }

        async function loadCountry(countryCode) {
            if (isLoading) return;
            isLoading = true;

            const countryNames = {
                es: 'España',
                mx: 'México',
                co: 'Colombia',
                ar: 'Argentina',
                pe: 'Perú',
                cl: 'Chile',
                ve: 'Venezuela',
                ec: 'Ecuador',
                gt: 'Guatemala',
                bo: 'Bolivia',
                cr: 'Costa Rica',
                do: 'República Dominicana',
                pa: 'Panamá',
                uy: 'Uruguay',
                py: 'Paraguay',
                ni: 'Nicaragua',
                hn: 'Honduras',
                sv: 'El Salvador'
            };

            const countryName = countryNames[countryCode] || countryCode.toUpperCase();
            channelCount.textContent = 'Descargando...';
            sidebar.innerHTML =
                `<div style="padding:20px;text-align:center;color:#555;">⏳ Cargando ${countryName}<br><span style="font-size:10px;">(solo canales en español)</span></div>`;

            const cacheKey = `channels_${countryCode}`;
            let channels = getCache(cacheKey);

            if (!channels) {
                try {
                    const url = getCountryUrl(countryCode);
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('Error al descargar la lista');
                    const data = await response.text();
                    channels = parseM3U(data);
                    saveCache(cacheKey, channels);
                } catch (error) {
                    console.error(error);
                    sidebar.innerHTML = `
                        <div style="padding:20px;text-align:center;color:#e50914;font-size:13px;">
                            ❌ Error al cargar ${countryName}<br>
                            <span style="font-size:10px;color:#666;">${error.message}</span>
                            <button onclick="location.reload()" style="margin-top:10px;padding:4px 14px;background:#e50914;border:none;color:#fff;border-radius:4px;cursor:pointer;font-size:12px;">Reintentar</button>
                        </div>
                    `;
                    channelCount.textContent = 'Error';
                    isLoading = false;
                    return;
                }
            } else {
                console.log(`✅ Cargado ${countryName} desde caché (${channels.length} canales)`);
            }

            allChannels = channels;
            currentPage = 0;
            channelCount.textContent = `${allChannels.length} canales`;
            renderChannels();
            isLoading = false;
        }

        function parseM3U(text) {
            const lines = text.split('\n');
            const channels = [];
            let current = null;

            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    let name = 'Canal sin nombre';
                    let logo = 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Television_icon.svg/120px-Television_icon.svg.png';
                    let category = 'General';

                    const logoMatch = line.match(/tvg-logo="([^"]*)"/);
                    if (logoMatch) logo = logoMatch[1];

                    const groupMatch = line.match(/group-title="([^"]*)"/);
                    if (groupMatch) category = groupMatch[1];

                    const parts = line.split(',');
                    if (parts.length > 1) {
                        name = parts[parts.length - 1].trim();
                    }
                    if (name.length > 50) name = name.substring(0, 47) + '...';

                    current = { name, logo, category, liveUrl: '' };
                } else if (line && !line.startsWith('#') && current) {
                    if (line.startsWith('http://') || line.startsWith('https://')) {
                        current.liveUrl = line;
                        channels.push(current);
                        current = null;
                    }
                }
            }
            return channels;
        }

        function renderChannels() {
            const start = currentPage * CONFIG.itemsPerPage;
            const end = start + CONFIG.itemsPerPage;
            const pageChannels = allChannels.slice(start, end);

            if (pageChannels.length === 0 && currentPage === 0) {
                sidebar.innerHTML =
                    `<div style="padding:20px;text-align:center;color:#555;font-size:12px;">📭 No se encontraron canales<br><span style="font-size:10px;">Prueba otro país</span></div>`;
                return;
            }

            let html = '';
            pageChannels.forEach(ch => {
                if (!ch.id) ch.id = 'ch_' + Math.random().toString(36).substr(2, 6);
                const isActive = (currentChannel && currentChannel.id === ch.id) ? 'active' : '';
                html += `
                    <div class="channel-item ${isActive}" data-id="${ch.id}" data-channel='${JSON.stringify(ch).replace(/'/g,"&#39;")}'>
                        <img src="${ch.logo}" alt="${ch.name}" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Television_icon.svg/120px-Television_icon.svg.png'" />
                        <div class="info">
                            <div class="name">${ch.name}</div>
                            <div class="cat">${ch.category}</div>
                        </div>
                        <span class="live">Live</span>
                    </div>
                `;
            });

            if (end < allChannels.length) {
                html += `<div class="load-more-btn" id="loadMoreBtn">⬇️ Cargar más (${allChannels.length - end} restantes)</div>`;
            }

            sidebar.innerHTML = html;

            document.querySelectorAll('.channel-item').forEach(el => {
                el.addEventListener('click', function() {
                    try {
                        const ch = JSON.parse(this.dataset.channel);
                        playChannel(ch);
                    } catch (e) { console.warn('Error al reproducir'); }
                });
            });

            const loadBtn = document.getElementById('loadMoreBtn');
            if (loadBtn) {
                loadBtn.addEventListener('click', () => {
                    currentPage++;
                    renderChannels();
                    sidebar.scrollTop = sidebar.scrollHeight * 0.7;
                });
            }

            if (currentChannel) {
                document.querySelectorAll('.channel-item').forEach(el => {
                    try {
                        const ch = JSON.parse(el.dataset.channel);
                        if (ch.id === currentChannel.id) el.classList.add('active');
                    } catch (e) {}
                });
            }
        }

        function playChannel(channel) {
            if (!channel || !channel.liveUrl) {
                console.warn('Canal sin URL');
                return;
            }
            currentChannel = channel;
            placeholder.style.display = 'none';

            const url = channel.liveUrl;

            if (url.includes('.m3u8') || url.includes('pluto.tv') || url.includes('akamaized') || url.includes('cdn')) {
                videoPlayer.style.display = 'block';
                iframePlayer.style.display = 'none';
                if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                    videoPlayer.src = url;
                } else {
                    loadHLS(url);
                }
                videoPlayer.play().catch(e => console.warn('Auto-play bloqueado'));
            } else if (url.includes('youtube.com') || url.includes('youtu.be') || url.includes('vimeo.com')) {
                videoPlayer.style.display = 'none';
                iframePlayer.style.display = 'block';
                iframePlayer.src = url;
            } else {
                videoPlayer.style.display = 'block';
                iframePlayer.style.display = 'none';
                videoPlayer.src = url;
                videoPlayer.play().catch(e => console.warn('Auto-play bloqueado'));
            }

            nowLogo.src = channel.logo || 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Television_icon.svg/120px-Television_icon.svg.png';
            nowName.textContent = channel.name || 'Canal sin nombre';
            nowCat.textContent = channel.category || 'General';

            document.querySelectorAll('.channel-item').forEach(el => {
                el.classList.remove('active');
                try {
                    const ch = JSON.parse(el.dataset.channel);
                    if (ch.id === channel.id) el.classList.add('active');
                } catch (e) {}
            });
        }

        function loadHLS(url) {
            if (typeof Hls !== 'undefined') {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(videoPlayer);
                return;
            }
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest';
            script.onload = () => {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(videoPlayer);
            };
            document.head.appendChild(script);
        }

        sourceSelector.addEventListener('change', function() {
            loadCountry(this.value);
        });

        sourceSelector.value = 'mx';
        loadCountry('mx');

        window.Teves = {
            loadCountry: loadCountry,
            playChannel: playChannel,
            channels: () => allChannels
        };
        console.log('📺 Teves Español - Versión original restaurada');
        console.log('💡 Selecciona tu país en el menú desplegable');
    </script>
</body>
</html>
